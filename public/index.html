<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registro Aeroportuale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Registro Aeroportuale</h1>
        <div class="stats" id="counter">Caricamento oggetti...</div>
        
        <div class="filter-bar">
            <button class="btn active" onclick="filtra('Tutti', this)">Tutti</button>
            <button class="btn" onclick="filtra('In magazzino', this)">In Magazzino</button>
            <button class="btn" onclick="filtra('Reclamato', this)">Reclamati</button>
            <button class="btn" onclick="filtra('Consegnato Polizia', this)">Polizia</button>
        </div>
    </header>
    
    <main>
        <div id="oggetti-container" class="card-grid"></div>
    </main>

    <script>
        // Variabile globale: conserverà tutti i 24 oggetti scaricati dal server.
        // Ci serve per non dover richiedere i dati al server ogni volta che clicchiamo un filtro.
        let tuttiGliOggetti = [];

        // Funzione asincrona che si avvia appena apriamo la pagina
        async function inizializza() {
            try {
                // fetch() chiama l'API creata nel file server.js
                const response = await fetch('/api/oggetti');
                
                // Estraiamo i dati dalla risposta del server
                tuttiGliOggetti = await response.json();
                
                // Passiamo i dati alla funzione che si occupa di disegnare le card sullo schermo
                mostraOggetti(tuttiGliOggetti);
            } catch (error) {
                console.error("Errore di connessione col server:", error);
                document.getElementById('counter').innerText = "Errore nel caricamento dei dati.";
            }
        }

        // Funzione per generare il codice HTML delle card in base alla lista che le viene passata
        function mostraOggetti(lista) {
            // Selezioniamo il contenitore HTML e lo svuotiamo (utile quando usiamo i filtri)
            const container = document.getElementById('oggetti-container');
            container.innerHTML = '';
            
            // Aggiorniamo il contatore in alto in base a quanti elementi ci sono nella 'lista'
            const counter = document.getElementById('counter');
            counter.innerText = `Visualizzati: ${lista.length} oggetti`;

            // Cicliamo su ogni singolo oggetto smarrito presente nella lista
            lista.forEach(item => {
                // Creiamo un nuovo elemento <div> per la card
                const card = document.createElement('div');
                card.className = 'card';
                
                // Creiamo una classe CSS dinamica per il pallino colorato. 
                // Esempio: "In magazzino" diventa "in-magazzino" (tutto minuscolo e con il trattino)
                let statoCls = item.stato.toLowerCase().replace(' ', '-');

                // Inseriamo l'HTML dentro la card usando i backtick (`) che permettono 
                // di inserire variabili JavaScript direttamente nel testo con ${}
                card.innerHTML = `
                    <div class="card-header">
                        <span class="id-tag">#${item.id}</span>
                        <span class="stato-dot ${statoCls}"></span>
                    </div>
                    <h3>${item.oggetto}</h3>
                    <p>📍 <strong>Luogo:</strong> ${item.luogo}</p>
                    <p>📅 <strong>Data:</strong> ${item.data_ritrovamento}</p>
                    <div class="stato-footer">${item.stato}</div>
                `;
                
                // Aggiungiamo fisicamente la card finita dentro il contenitore sulla pagina web
                container.appendChild(card);
            });
        }

        // Funzione che gestisce i filtri quando si clicca un bottone
        function filtra(stato, btn) {
            // 1. GESTIONE GRAFICA: Togliamo la classe 'active' da tutti i bottoni e la mettiamo solo su quello cliccato
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // 2. GESTIONE DATI: Decidiamo quali card mostrare
            if (stato === 'Tutti') {
                // Se clicchiamo "Tutti", passiamo l'array completo alla funzione che disegna le card
                mostraOggetti(tuttiGliOggetti);
            } else {
                // Selezioniamo solo gli oggetti il cui stato corrisponde a quello del bottone cliccato.
                // Il metodo .filter() crea un nuovo array contenente solo gli elementi che superano il test.
                const filtrati = tuttiGliOggetti.filter(oggetto => oggetto.stato === stato);
                
                // Passiamo l'array rimpicciolito alla funzione che disegna le card
                mostraOggetti(filtrati);
            }
        }

        // Questo è il punto di partenza: richiamiamo la funzione iniziale appena il browser legge questo script
        inizializza();
    </script>
</body>
</html>
